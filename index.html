<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>89BET</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:26px;
color:#00ff88;
}

.container{
padding:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#00ff88;
border:none;
border-radius:5px;
font-size:16px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<header>89BET</header>

<div class="container">

<div class="card" id="auth">

<h3>Criar Conta</h3>

<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha" type="password">

<button onclick="register()">Criar Conta</button>

<h3>Login</h3>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" placeholder="Senha" type="password">

<button onclick="login()">Entrar</button>

</div>

<div class="card" id="dashboard" style="display:none">

<h2>Painel</h2>

<p>Usuário: <span id="username"></span></p>

<p>Saldo: R$ <span id="saldo">0</span></p>

<button onclick="deposit()">Depositar +50</button>

<button onclick="play()">Jogar Slot</button>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || {};

function register(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(!user || !pass){
alert("Preencha tudo");
return;
}

users[user] = {pass:pass, saldo:0};

localStorage.setItem("users", JSON.stringify(users));

alert("Conta criada");

}

function login(){

let user = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

if(users[user] && users[user].pass === pass){

localStorage.setItem("logado", user);

showDashboard();

}else{

alert("Login inválido");

}

}

function showDashboard(){

let user = localStorage.getItem("logado");

if(!user) return;

document.getElementById("auth").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("username").innerText=user;

document.getElementById("saldo").innerText=users[user].saldo;

}

function deposit(){

let user = localStorage.getItem("logado");

users[user].saldo += 50;

localStorage.setItem("users", JSON.stringify(users));

showDashboard();

}

function play(){

let user = localStorage.getItem("logado");

if(users[user].saldo < 10){
alert("Saldo insuficiente");
return;
}

users[user].saldo -= 10;

if(Math.random() > 0.5){
users[user].saldo += 20;
alert("Você ganhou!");
}else{
alert("Você perdeu!");
}

localStorage.setItem("users", JSON.stringify(users));

showDashboard();

}

function logout(){

localStorage.removeItem("logado");

location.reload();

}

showDashboard();

</script>

</body>
</html>
